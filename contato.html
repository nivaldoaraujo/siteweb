<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #f4f4f4;
            font-family: Arial, Helvetica, sans-serif;
        }
        /* menu */
        header{
            background-color: #333;
            padding: 15px;
        }
        nav ul{
            list-style: none;
            text-align: center;
        }
        nav ul li{
            display: inline;
            margin: 0 20px;
        }
        nav ul li a{
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav ul li a:hover{
            color: blanchedalmond;
        }
        .formulario{
            padding-top: 10px;
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 25px;
            border-radius: 10px;
        }

        .formulario h2{
            text-align: center;
            margin-bottom: 20px;
        }

        .formulario label{
            display: block;
            margin-top: 10px;
        }

        .formulario input,
        .formulario textarea{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .formulario button{
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .formulario button:hover{
            background-color: #555;
        }
         /* Rodapé */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
        main h2{
            align-items: center;
        }
    </style>
</head>
<body>
     <!-- menu horizontal -->
     <header>
        <nav>
            <ul>
                <li> <a href="index.html">Home</a> </li>
                <li> <a href="sobre.html">Sobre</a> </li>
                <li> <a href="contato.html">Contato</a> </li>
            </ul>
        </nav>
     </header>

    <!-- corpo da página -->
    <main>
        
        <div class="formulario">
            <h2>Entre em Contato</h2>
            <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" required>

            <label for="assunto">Assunto:</label>
            <textarea id="assunto" rows="5" required></textarea>

            <button type="submit">Enviar</button>
        </form>
    </div>
    </main>
    <!-- rodapé da página -->
     <footer>
        www.meusite.com.br
     </footer>
    
</body>
</html>
