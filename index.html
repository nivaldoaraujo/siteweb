<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha página WEB</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #f4f4f4;
            font-family: Arial, Helvetica, sans-serif;
        }
        /* menu */
        header{
            background-color: #333;
            padding: 15px;
        }
        nav ul{
            list-style: none;
            text-align: center;
        }
        nav ul li{
            display: inline;
            margin: 0 20px;
        }
        nav ul li a{
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav ul li a:hover{
            color: blanchedalmond;
        }
        /* continuar */
        /* Conteúdo */
        main {
            text-align: center;
            padding: 40px;
        }

        main img {
            width: 500px;
            max-width: 100%;
            border-radius: 10px;
        }

        .texto {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }

        /* Rodapé */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <!-- menu horizontal -->
     <header>
        <nav>
            <ul>
                <li> <a href="#">Home</a> </li>
                <li> <a href="#">Sobre</a> </li>
                <li> <a href="#">Contato</a> </li>
            </ul>
        </nav>
     </header>

    <!-- corpo da página -->
    <main>
        <img src="imagem/img.jpg" alt="" >
        <div class="texto">
            <h2>Bem-vindo ao nosso site</h2>
            <p>Esta é uma página desenvolvida utilizando apenas HTML e CSS.
                Aqui você pode adicionar informações sobre sua empresa,
                projeto ou portfólio.
            </p>
        </div>
    </main>
    <!-- rodapé da página -->
     <footer>
        www.meusite.com.br
     </footer>
</body>
</html>
